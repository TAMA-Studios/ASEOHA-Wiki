title: ASEOHA Wiki
baseURL: https://tama-studios.github.io/ASEOHA-Wiki/
enableRobotsTXT: true
enableGitInfo: true
defaultContentLanguage: en

module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: content
      target: content

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  author:
    name: TAMA Studios
    email: null@tamastudios.us

menu:
  main:
    - name: GitHub
      url: "https://github.com/TAMA-Studios/ASEOHA"
      weight: 1
title: ASEOHA Wiki
baseURL: https://tama-studios.github.io/ASEOHA-Wiki/
enableRobotsTXT: true
enableGitInfo: true
defaultContentLanguage: en

module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: content
      target: content

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  author:
    name: TAMA Studios
    email: null@tamastudios.us
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  editURL:
    base: "https://github.com/TAMA-Studios/ASEOHA-Wiki/edit/main/content/"
  search:
    enable: true

menu:
  main:
    - name: GitHub
      url: "https://github.com/TAMA-Studios/ASEOHA"
      weight: 1
      params:
        icon: github
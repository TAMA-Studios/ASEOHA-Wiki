    label: Pages
    type: collection
    path: docs
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
      - name: description
        label: Description
        type: text
      - name: body
        label: Body
        type: rich-text